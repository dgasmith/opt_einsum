name: Tests

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  tests:
    name: ${{ matrix.extras }} / py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            extras: "test,lint"
          - python-version: "3.14"
            extras: "test,lint"
          - python-version: "3.12"
            extras: "test,lint,numpy,dask"
          - python-version: "3.13"
            extras: "test,lint,numpy,dask,jax,sparse"
          - python-version: "3.13"
            extras: "test,lint,torch"
          - python-version: "3.12"
            extras: "test,lint,numpy"

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true

    - name: Install
      run: uv pip install -e ".[${{ matrix.extras }}]"

    - name: Test
      run: uv run --no-sync pytest -v --cov=opt_einsum/ --cov-report=xml

    - name: Coverage
      run: uv run --no-sync coverage report

    - uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
