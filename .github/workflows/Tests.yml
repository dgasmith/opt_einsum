name: Tests

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  tests:
    name: ${{ matrix.environment }} / py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            environment: "min-deps"
            extras: "test,lint"
          - python-version: "3.14"
            environment: "min-deps"
            extras: "test,lint"
          - python-version: "3.12"
            environment: "min-ver"
            extras: "test,lint,numpy,dask"
          - python-version: "3.13"
            environment: "full"
            extras: "test,lint,numpy,tensorflow,dask,jax,sparse"
          - python-version: "3.13"
            environment: "torch-only"
            extras: "test,lint,torch"

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true

    - name: Install
      run: uv pip install -e ".[${{ matrix.extras }}]"

    - name: Check no NumPy for torch-only environment
      if: matrix.environment == 'torch-only'
      run: python devtools/ci_scripts/check_no_numpy.py

    - name: Test
      run: uv run pytest -v --cov=opt_einsum opt_einsum/ --cov-report=xml

    - name: Coverage
      run: uv run coverage report

    - uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
