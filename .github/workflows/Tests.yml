name: Tests

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  tests:
    name: ${{ matrix.extras }} / py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            extras: "test,lint"
          - python-version: "3.14"
            extras: "test,lint"
          - python-version: "3.12"
            extras: "test,lint,numpy,dask"
          - python-version: "3.13"
            extras: "test,lint,numpy,dask,jax,sparse"
          - python-version: "3.13"
            extras: "test,lint,torch"
            check-no-numpy: true
          - python-version: "3.12"
            extras: "test,lint,numpy"
            extra-packages: "tensorflow-cpu"

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true

    - name: Install extra packages
      if: matrix.extra-packages != ''
      run: uv pip install ${{ matrix.extra-packages }}

    - name: Check no NumPy for torch-only environment
      if: matrix['check-no-numpy']
      run: python devtools/ci_scripts/check_no_numpy.py

    - name: Test
      run: uv run --with ".[${{ matrix.extras }}]" pytest -v --cov=opt_einsum/ --cov-report=xml

    - name: Coverage
      run: uv run --with ".[test]" coverage report

    - uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
